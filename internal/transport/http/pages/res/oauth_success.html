<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background:
        radial-gradient(circle at top, rgba(74, 222, 128, 0.14), transparent 35%),
        linear-gradient(180deg, #0e1310 0%, #0d0f0d 100%);
      color: #e4e4e7;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
      backdrop-filter: blur(14px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    .icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 1.25rem;
      border-radius: 50%;
      background: rgba(74, 222, 128, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 24px;
      height: 24px;
      stroke: #4ade80;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      color: #fff;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #d4d4d8;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

    .username {
      display: inline-block;
      padding: 0.375rem 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.03);
      font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.8125rem;
      color: #bef264;
      margin-bottom: 1.5rem;
    }

    .hint {
      font-size: 0.8125rem;
      color: #a1a1aa;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card" role="status" aria-live="polite">
    <div class="icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>{{.Title}}</h1>
    <p class="subtitle">{{.Message}}</p>
    {{if .Username}}<div class="username">{{.Username}}</div>{{end}}
    <p class="hint">Return to Telegram to finish setup and see your access.</p>
  </div>
</body>
</html>
