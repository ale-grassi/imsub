repos:
  - repo: local
    hooks:
      - id: make-fmt
        name: make fmt
        entry: make fmt
        language: system
        pass_filenames: false
        types:
          - go
      - id: make-lint
        name: make lint
        entry: make lint
        language: system
        pass_filenames: false
        types:
          - go
      - id: make-test
        name: make test
        entry: make test
        language: system
        pass_filenames: false
        types:
          - go
      - id: make-secrets-scan
        name: make secrets-scan
        entry: make secrets-scan
        language: system
        pass_filenames: false
