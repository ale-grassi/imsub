version: "2"

run:
  timeout: 3m

linters:
  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - errorlint
    - gocritic
    - govet
    - ineffassign
    - misspell
    - nilerr
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - unparam
